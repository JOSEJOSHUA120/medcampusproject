<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- White inner circle -->
  <circle cx="100" cy="100" r="85" fill="white" opacity="0.15"/>
  <!-- Medical cross -->
  <rect x="85" y="40" width="30" height="65" rx="6" fill="white"/>
  <rect x="68" y="55" width="64" height="30" rx="6" fill="white"/>
  <!-- Text -->
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white">KLINIK</text>
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="white">DIGITAL</text>
</svg>